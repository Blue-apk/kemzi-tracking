<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kemzi Studio - Seguimiento de Pedidos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0F0F0F;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: #1A1A1A;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 204, 188, 0.15);
            backdrop-filter: blur(4px);
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo-icon {
            background: rgba(0, 204, 188, 0.12);
            padding: 8px;
            border-radius: 16px;
            font-size: 24px;
        }
        .logo h1 {
            color: white;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header p {
            color: #888;
            font-size: 13px;
        }
        
        /* Search box */
        .search-box {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 6px;
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 204, 188, 0.2);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .search-box input::placeholder { color: #555; }
        .search-box button {
            background: #00CCBC;
            border: none;
            border-radius: 16px;
            padding: 0 22px;
            color: #0F0F0F;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover { background: #00B3A5; }
        
        /* Tarjetas */
        .info-card, .timeline, .queue-card {
            background: #1A1A1A;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tracking-code {
            color: #00CCBC;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .customer-name {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .product-info {
            color: #AAA;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .price-info {
            color: #AAA;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2A2A2A;
            font-size: 13px;
        }
        
        /* Cola */
        .queue-card {
            background: linear-gradient(135deg, rgba(0,204,188,0.08), rgba(0,139,123,0.04));
            border: 1px solid rgba(0,204,188,0.3);
        }
        .queue-title {
            color: #00CCBC;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .queue-position {
            font-size: 52px;
            font-weight: 800;
            color: #00CCBC;
            text-align: center;
            line-height: 1;
            margin: 8px 0;
        }
        .queue-label {
            color: #999;
            font-size: 12px;
            text-align: center;
        }
        .estimated-time {
            background: rgba(0,204,188,0.1);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            margin-top: 18px;
        }
        .estimated-time span {
            color: #00CCBC;
            font-weight: bold;
        }
        .priority-badge {
            font-size: 11px;
            color: #00CCBC;
            text-align: center;
            margin-top: 12px;
            opacity: 0.8;
        }
        
        /* Timeline minimalista */
        .timeline-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2A2A2A;
        }
        .timeline-item {
            display: flex;
            margin-bottom: 20px;
            position: relative;
        }
        .timeline-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 32px;
            bottom: -20px;
            width: 1.5px;
            background: #2A2A2A;
        }
        .timeline-icon {
            width: 30px;
            height: 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            z-index: 2;
            font-size: 14px;
            background: #2A2A2A;
            color: #777;
        }
        .timeline-icon.completed {
            background: #00CCBC;
            color: #0F0F0F;
        }
        .timeline-icon.current {
            background: #00CCBC;
            color: #0F0F0F;
            box-shadow: 0 0 0 3px rgba(0,204,188,0.2);
        }
        .timeline-icon.pending {
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
            color: #555;
        }
        .timeline-stage {
            color: #DDD;
            font-size: 14px;
            font-weight: 500;
        }
        .timeline-stage.current {
            color: #00CCBC;
        }
        .timeline-status {
            font-size: 11px;
            color: #777;
            margin-top: 4px;
        }
        
        /* Estados vacíos */
        .error-message, .initial-message {
            background: #1A1A1A;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
        }
        .error-message h3, .initial-message h3 {
            color: white;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .error-message p, .initial-message p {
            color: #888;
            font-size: 13px;
        }
        .loader { display: flex; justify-content: center; padding: 60px; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #2A2A2A;
            border-top-color: #00CCBC;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sync-status {
            font-size: 10px;
            color: #555;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">✨</div>
                <h1>Kemzi Studio</h1>
            </div>
            <p>Seguimiento de pedidos</p>
        </div>

        <div class="search-box">
            <input type="text" id="trackingCode" placeholder="Código (ej: KEMZI-123456)">
            <button onclick="buscarPedido()">Buscar</button>
        </div>

        <div id="contenido"></div>
        <div id="estadoSincronizacion" class="sync-status"></div>
    </div>

    <script>
        let pedidos = [];

        const etapasRopa = [
            "Abono recibido", "En diseño", "Diseño aprobado", "En impresión",
            "En planchado", "En confección", "Control de calidad", "Listo para entregar", "Entregado"
        ];

        const etapasPromo = [
            "Abono recibido", "En diseño", "Diseño aprobado", "En impresión",
            "Control de calidad", "Listo para entregar", "Entregado"
        ];

        const productosRopa = ["Chaquetas", "Franelas", "Jersey"];

        function obtenerEtapas(tipoProducto) {
            return productosRopa.includes(tipoProducto) ? etapasRopa : etapasPromo;
        }

        function calcularPosicionCola(trackingCode) {
            const activos = pedidos.filter(p => p.currentStage !== 'Entregado');
            activos.sort((a, b) => {
                if (a.priority === 'Urgente' && b.priority !== 'Urgente') return -1;
                if (a.priority !== 'Urgente' && b.priority === 'Urgente') return 1;
                return new Date(a.createdAt) - new Date(b.createdAt);
            });
            const posicion = activos.findIndex(p => p.trackingCode === trackingCode);
            return posicion >= 0 ? posicion + 1 : -1;
        }

        function calcularTiempoEstimado(posicion) {
            const dias = (posicion - 1) * 1.5;
            if (dias <= 0) return 'En proceso, pronto estará listo';
            if (dias < 1) return 'Menos de 1 día';
            if (dias === 1) return 'Aproximadamente 1 día';
            return `Aproximadamente ${Math.round(dias)} días`;
        }

        async function cargarPedidos() {
            try {
                document.getElementById('estadoSincronizacion').innerHTML = '🔄 Cargando datos...';
                const respuesta = await fetch('orders.json?v=' + Date.now());
                if (!respuesta.ok) throw new Error('No se encontró orders.json');
                pedidos = await respuesta.json();
                document.getElementById('estadoSincronizacion').innerHTML = `✅ ${pedidos.length} pedidos · ${new Date().toLocaleTimeString()}`;
            } catch(e) {
                document.getElementById('estadoSincronizacion').innerHTML = '⚠️ Error al cargar datos';
            }
        }

        function buscarPedido() {
            const codigo = document.getElementById('trackingCode').value.trim().toUpperCase();
            const contenedor = document.getElementById('contenido');
            
            if (!codigo) {
                contenedor.innerHTML = `<div class="error-message"><h3>Ingresa un código</h3><p>Ej: KEMZI-123456</p></div>`;
                return;
            }

            contenedor.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;

            setTimeout(() => {
                const pedido = pedidos.find(p => p.trackingCode === codigo);
                
                if (!pedido) {
                    contenedor.innerHTML = `<div class="error-message"><h3>Pedido no encontrado</h3><p>Verifica el código ingresado</p></div>`;
                    return;
                }

                const etapas = obtenerEtapas(pedido.productType);
                const etapaActual = pedido.currentStage;
                const indiceActual = etapas.indexOf(etapaActual);
                const posicionCola = calcularPosicionCola(pedido.trackingCode);
                const tiempoEstimado = calcularTiempoEstimado(posicionCola);
                const fechaCreacion = new Date(pedido.createdAt);
                const fechaStr = `${fechaCreacion.getDate()}/${fechaCreacion.getMonth()+1}/${fechaCreacion.getFullYear()}`;
                const totalActivos = pedidos.filter(p => p.currentStage !== 'Entregado').length;

                let timelineHtml = '';
                for (let i = 0; i < etapas.length; i++) {
                    const etapa = etapas[i];
                    const completada = i < indiceActual;
                    const actual = i === indiceActual;
                    
                    let icono = '○';
                    if (completada) icono = '✓';
                    else if (actual) icono = '●';
                    
                    timelineHtml += `
                        <div class="timeline-item">
                            <div class="timeline-icon ${completada ? 'completed' : (actual ? 'current' : 'pending')}">
                                ${icono}
                            </div>
                            <div class="timeline-content">
                                <div class="timeline-stage ${actual ? 'current' : ''}">${etapa}</div>
                                <div class="timeline-status">${completada ? 'Completado' : (actual ? 'En proceso' : 'Pendiente')}</div>
                            </div>
                        </div>
                    `;
                }

                contenedor.innerHTML = `
                    <div class="info-card">
                        <div class="tracking-code">📦 CÓDIGO: ${pedido.trackingCode}</div>
                        <div class="customer-name">${pedido.customerName}</div>
                        <div class="product-info">📌 ${pedido.productType} · Talla ${pedido.size}</div>
                        <div class="product-info">🎨 Color: ${pedido.color || 'No especificado'}</div>
                        <div class="product-info">✏️ Diseño: ${pedido.design || 'Sin diseño'}</div>
                        <div class="price-info">💰 Total: $${pedido.amountUsd || '0.00'} · 📅 ${fechaStr}</div>
                    </div>
                    
                    <div class="queue-card">
                        <div class="queue-title">📊 POSICIÓN EN COLA</div>
                        <div class="queue-position">#${posicionCola}</div>
                        <div class="queue-label">de ${totalActivos} pedidos activos</div>
                        <div class="estimated-time">
                            ⏱️ <span>Tiempo estimado de entrega:</span><br>
                            ${tiempoEstimado}
                        </div>
                        <div class="priority-badge">
                            ${pedido.priority === 'Urgente' ? '🚨 Prioridad urgente' : '📋 Prioridad normal'}
                        </div>
                    </div>
                    
                    <div class="timeline">
                        <div class="timeline-title">📋 Progreso del pedido</div>
                        ${timelineHtml}
                    </div>
                `;
            }, 300);
        }

        function obtenerParametro(p) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(p);
        }

        cargarPedidos();
        setInterval(cargarPedidos, 60000);
        
        const codigoParam = obtenerParametro('code');
        if (codigoParam) {
            document.getElementById('trackingCode').value = codigoParam;
            setTimeout(buscarPedido, 1000);
        } else {
            document.getElementById('contenido').innerHTML = `
                <div class="initial-message">
                    <h3>Seguimiento de pedidos</h3>
                    <p>Ingresa tu código de seguimiento<br>para ver el estado de tu pedido</p>
                </div>
            `;
        }
    </script>
</body>
</html>    
</body>
</html>
