<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kemzi Studio - Seguimiento de Pedidos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #1D1D1D;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header {
            background: #2A2A2A;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 204, 188, 0.2);
        }
        .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .logo-icon { background: rgba(0, 204, 188, 0.15); padding: 10px; border-radius: 14px; }
        .logo h1 { color: white; font-size: 20px; }
        .header p { color: #A5A5A5; font-size: 13px; }
        .search-box {
            background: #2A2A2A;
            border-radius: 16px;
            padding: 6px;
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 204, 188, 0.2);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: white;
            outline: none;
        }
        .search-box input::placeholder { color: #666; }
        .search-box button {
            background: #00CCBC;
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .info-card, .timeline, .queue-card {
            background: #2A2A2A;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .tracking-code { color: #00CCBC; font-size: 12px; margin-bottom: 12px; }
        .customer-name { color: white; font-size: 20px; font-weight: bold; margin-bottom: 6px; }
        .product-info { color: #A5A5A5; font-size: 13px; margin-bottom: 4px; }
        .price-info { color: #A5A5A5; margin-top: 8px; padding-top: 8px; border-top: 1px solid #3A3A3A; }
        
        .queue-card {
            background: linear-gradient(135deg, #00CCBC20, #008B7A10);
            border: 1px solid #00CCBC40;
        }
        .queue-title { color: #00CCBC; font-size: 14px; font-weight: 600; margin-bottom: 16px; }
        .queue-position { font-size: 48px; font-weight: bold; color: #00CCBC; text-align: center; margin: 10px 0; }
        .queue-label { color: #A5A5A5; font-size: 12px; text-align: center; }
        .estimated-time {
            background: #00CCBC20;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            margin-top: 16px;
        }
        .estimated-time span { color: #00CCBC; font-weight: bold; }
        
        .timeline-title { color: white; font-size: 16px; font-weight: 600; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #3A3A3A; }
        .timeline-item { display: flex; margin-bottom: 20px; position: relative; }
        .timeline-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 16px;
            top: 32px;
            bottom: -20px;
            width: 2px;
            background: #3A3A3A;
        }
        .timeline-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            z-index: 1;
        }
        .timeline-icon.completed { background: #00CCBC; }
        .timeline-icon.pending { background: #2A2A2A; border: 2px solid #4A4A4A; }
        .timeline-icon.current { background: #00CCBC; box-shadow: 0 0 0 4px rgba(0, 204, 188, 0.2); }
        .timeline-stage { color: white; font-size: 14px; font-weight: 500; }
        .timeline-stage.current { color: #00CCBC; }
        .timeline-status { font-size: 11px; color: #A5A5A5; margin-top: 4px; }
        .error-message, .initial-message { background: #2A2A2A; border-radius: 20px; padding: 40px 20px; text-align: center; }
        .error-message h3, .initial-message h3 { color: white; margin-bottom: 8px; }
        .loader { display: flex; justify-content: center; padding: 60px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #2A2A2A; border-top-color: #00CCBC; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sync-status { font-size: 10px; color: #666; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📦</div>
                <h1>Kemzi Studio</h1>
            </div>
            <p>Seguimiento de pedidos</p>
        </div>

        <div class="search-box">
            <input type="text" id="trackingCode" placeholder="Código (ej: KEMZI-123456)">
            <button onclick="buscarPedido()">Buscar</button>
        </div>

        <div id="contenido"></div>
        <div id="estadoSincronizacion" class="sync-status"></div>
    </div>

    <script>
        let pedidos = [];

        const etapasRopa = [
            "Abono recibido", "En diseño", "Diseño aprobado", "En impresión",
            "En planchado", "En confección", "Control de calidad", "Listo para entregar", "Entregado"
        ];

        const etapasPromo = [
            "Abono recibido", "En diseño", "Diseño aprobado", "En impresión",
            "Control de calidad", "Listo para entregar", "Entregado"
        ];

        const productosRopa = ["Chaquetas", "Franelas", "Jersey"];

        function obtenerEtapas(tipoProducto) {
            return productosRopa.includes(tipoProducto) ? etapasRopa : etapasPromo;
        }

        function calcularPosicionCola(trackingCode) {
            const activos = pedidos.filter(p => p.currentStage !== 'Entregado');
            activos.sort((a, b) => {
                if (a.priority === 'Urgente' && b.priority !== 'Urgente') return -1;
                if (a.priority !== 'Urgente' && b.priority === 'Urgente') return 1;
                return new Date(a.createdAt) - new Date(b.createdAt);
            });
            const posicion = activos.findIndex(p => p.trackingCode === trackingCode);
            return posicion >= 0 ? posicion + 1 : -1;
        }

        function calcularTiempoEstimado(posicion) {
            const dias = (posicion - 1) * 1.5;
            if (dias <= 0) return 'En proceso, pronto estará listo';
            if (dias < 1) return 'Menos de 1 día';
            if (dias === 1) return 'Aproximadamente 1 día';
            return `Aproximadamente ${Math.round(dias)} días`;
        }

        async function cargarPedidos() {
            try {
                document.getElementById('estadoSincronizacion').innerHTML = '🔄 Cargando datos...';
                const respuesta = await fetch('orders.json?v=' + Date.now());
                if (!respuesta.ok) throw new Error('No se encontró orders.json');
                pedidos = await respuesta.json();
                document.getElementById('estadoSincronizacion').innerHTML = `✅ ${pedidos.length} pedidos · ${new Date().toLocaleTimeString()}`;
            } catch(e) {
                document.getElementById('estadoSincronizacion').innerHTML = '⚠️ Error al cargar datos';
            }
        }

        function buscarPedido() {
            const codigo = document.getElementById('trackingCode').value.trim().toUpperCase();
            const contenedor = document.getElementById('contenido');
            
            if (!codigo) {
                contenedor.innerHTML = `<div class="error-message"><h3>Ingresa un código</h3><p>Ej: KEMZI-123456</p></div>`;
                return;
            }

            contenedor.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;

            setTimeout(() => {
                const pedido = pedidos.find(p => p.trackingCode === codigo);
                
                if (!pedido) {
                    contenedor.innerHTML = `<div class="error-message"><h3>Pedido no encontrado</h3><p>Verifica el código ingresado</p></div>`;
                    return;
                }

                const etapas = obtenerEtapas(pedido.productType);
                const etapaActual = pedido.currentStage;
                const indiceActual = etapas.indexOf(etapaActual);
                const posicionCola = calcularPosicionCola(pedido.trackingCode);
                const tiempoEstimado = calcularTiempoEstimado(posicionCola);
                const fechaCreacion = new Date(pedido.createdAt);
                const fechaStr = `${fechaCreacion.getDate()}/${fechaCreacion.getMonth()+1}/${fechaCreacion.getFullYear()}`;
                const totalActivos = pedidos.filter(p => p.currentStage !== 'Entregado').length;

                let timelineHtml = '';
                for (let i = 0; i < etapas.length; i++) {
                    const etapa = etapas[i];
                    const completada = i < indiceActual;
                    const actual = i === indiceActual;
                    
                    timelineHtml += `
                        <div class="timeline-item">
                            <div class="timeline-icon ${completada ? 'completed' : (actual ? 'current' : 'pending')}">
                                ${completada ? '✓' : (actual ? '◉' : '○')}
                            </div>
                            <div class="timeline-content">
                                <div class="timeline-stage ${actual ? 'current' : ''}">${etapa}</div>
                                <div class="timeline-status">${completada ? 'Completado' : (actual ? 'En proceso' : 'Pendiente')}</div>
                            </div>
                        </div>
                    `;
                }

                contenedor.innerHTML = `
                    <div class="info-card">
                        <div class="tracking-code">CÓDIGO: ${pedido.trackingCode}</div>
                        <div class="customer-name">${pedido.customerName}</div>
                        <div class="product-info">${pedido.productType} · Talla ${pedido.size}</div>
                        <div class="product-info">Color: ${pedido.color || 'No especificado'}</div>
                        <div class="product-info">Diseño: ${pedido.design || 'Sin diseño'}</div>
                        <div class="price-info">Total: $${pedido.amountUsd || '0.00'} · Pedido: ${fechaStr}</div>
                    </div>
                    
                    <div class="queue-card">
                        <div class="queue-title">📊 POSICIÓN EN COLA DE PRODUCCIÓN</div>
                        <div class="queue-position">#${posicionCola}</div>
                        <div class="queue-label">de ${totalActivos} pedidos activos</div>
                        <div class="estimated-time">
                            ⏱️ <span>Tiempo estimado de entrega:</span><br>
                            ${tiempoEstimado}
                        </div>
                        <div style="font-size: 11px; color: #666; text-align: center; margin-top: 12px;">
                            ${pedido.priority === 'Urgente' ? '🚨 Prioridad urgente - Se atenderá antes' : '📋 Prioridad normal'}
                        </div>
                    </div>
                    
                    <div class="timeline">
                        <div class="timeline-title">📦 Progreso del pedido</div>
                        ${timelineHtml}
                    </div>
                `;
            }, 300);
        }

        function obtenerParametro(p) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(p);
        }

        cargarPedidos();
        setInterval(cargarPedidos, 60000);
        
        const codigoParam = obtenerParametro('code');
        if (codigoParam) {
            document.getElementById('trackingCode').value = codigoParam;
            setTimeout(buscarPedido, 1000);
        } else {
            document.getElementById('contenido').innerHTML = `
                <div class="initial-message">
                    <h3>Seguimiento de pedidos</h3>
                    <p>Ingresa tu código de seguimiento<br>para ver el estado de tu pedido</p>
                </div>
            `;
        }
    </script>
</body>
</html>
