<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kemzi Studio · Seguimiento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 650px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1D1D1D;
            letter-spacing: -0.3px;
        }

        .header h1 span {
            color: #00CCBC;
        }

        .header p {
            color: #A5A5A5;
            font-size: 14px;
            margin-top: 2px;
        }

        .search-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 8px 8px 8px 18px;
            margin-bottom: 24px;
            box-shadow: 0 6px 20px rgba(0, 204, 188, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 12px 0;
            border: none;
            font-size: 15px;
            background: transparent;
            color: #1D1D1D;
            outline: none;
        }

        .search-input::placeholder {
            color: #A5A5A5;
        }

        .search-btn {
            background: #00CCBC;
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .search-btn:active {
            opacity: 0.8;
        }

        .order-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            margin-bottom: 16px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .order-code {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 14px;
            font-weight: 600;
            color: #00CCBC;
            background: #e6f9f7;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        .order-status {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
        }

        .status-pendiente { background: #fff3e0; color: #e67e22; }
        .status-produccion { background: #e3f0ff; color: #2d7fc1; }
        .status-enviado { background: #e0f2f1; color: #00796b; }
        .status-entregado { background: #e8f5e9; color: #2e7d32; }
        .status-cancelado { background: #fbe9e7; color: #c62828; }

        .client-name {
            font-size: 20px;
            font-weight: 700;
            color: #1D1D1D;
            margin-bottom: 4px;
        }

        .product-detail {
            color: #353535;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .product-detail:last-of-type {
            margin-bottom: 16px;
        }

        .product-detail .label {
            font-weight: 500;
            color: #A5A5A5;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f2f8;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 500;
            color: #A5A5A5;
            font-size: 14px;
        }

        .info-value {
            font-weight: 600;
            color: #1D1D1D;
            font-size: 14px;
        }

        .queue-section {
            background: #F5F5F5;
            border-radius: 24px;
            padding: 20px 16px;
            margin: 20px 0 16px 0;
            text-align: center;
        }

        .queue-number {
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
            color: #00CCBC;
        }

        .queue-label {
            font-size: 14px;
            color: #A5A5A5;
            margin-top: 4px;
        }

        .queue-subtext {
            font-size: 12px;
            color: #A5A5A5;
            margin-top: 4px;
        }

        .progress-bar-track {
            background: #e8e8e8;
            border-radius: 12px;
            height: 8px;
            margin: 16px 0 12px 0;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 12px;
            background: #00CCBC;
            width: 0%;
            transition: width 0.3s ease;
        }

        .queue-meta {
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 13px;
            color: #353535;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .queue-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timeline {
            margin-top: 20px;
        }

        .timeline-title {
            font-weight: 700;
            font-size: 16px;
            color: #1D1D1D;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }

        .step-indicator {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #edf0f8;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
            font-size: 13px;
            color: #A5A5A5;
            transition: all 0.2s;
        }

        .step-indicator.done {
            background: #00CCBC;
            color: white;
        }

        .step-indicator.active {
            background: #1D1D1D;
            color: white;
            box-shadow: 0 0 0 3px rgba(0, 204, 188, 0.15);
        }

        .step-info {
            flex: 1;
        }

        .step-name {
            font-weight: 500;
            color: #1D1D1D;
            font-size: 15px;
        }

        .step-status-text {
            font-size: 12px;
            color: #A5A5A5;
        }

        .step-status-text.done {
            color: #00CCBC;
        }
        .step-status-text.active {
            color: #1D1D1D;
            font-weight: 500;
        }

        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 48px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.2s;
            text-decoration: none;
        }

        .whatsapp-btn:hover {
            background: #1ebe5c;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
        }

        .empty-state .emoji {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1D1D1D;
            margin-bottom: 6px;
        }

        .empty-state p {
            color: #A5A5A5;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #A5A5A5;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #A5A5A5;
        }

        .delivery-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: #e6f9f7;
            color: #00CCBC;
        }

        .position-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            background: #00CCBC;
            color: white;
        }

        @media (max-width: 480px) {
            body { padding: 12px 12px; }
            .order-card { padding: 18px 16px; }
            .client-name { font-size: 18px; }
            .queue-number { font-size: 36px; }
            .search-card { padding: 6px 6px 6px 14px; }
            .search-btn { padding: 8px 16px; font-size: 13px; }
            .step-indicator { width: 28px; height: 28px; font-size: 11px; margin-right: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>Kemzi</span> Studio</h1>
            <p>Seguimiento de pedidos</p>
        </div>

        <div class="search-card">
            <input type="text" id="searchInput" class="search-input" placeholder="Código del pedido" autocomplete="off">
            <button class="search-btn" onclick="buscarPedido()">Buscar</button>
        </div>

        <div id="orderContent">
            <div class="order-card empty-state">
                <div class="emoji">🔍</div>
                <h3>Busca tu pedido</h3>
                <p>Ingresa el código que recibiste en tu mensaje de confirmación.</p>
            </div>
        </div>

        <div class="footer">Kemzi Studio · Todos los derechos reservados</div>
    </div>

    <script>
        // ============================================================
        //  URL DEL JSON EN GITHUB
        // ============================================================
        const ORDERS_JSON_URL = 'https://raw.githubusercontent.com/blue-apk/kemzi-tracking/main/orders.json';

        // ============================================================
        //  ETAPAS DEL PROCESO
        // ============================================================
        const etapas = [
            "Abono recibido",
            "En diseño",
            "Diseño aprobado",
            "En impresión",
            "En planchado",
            "En confección",
            "Control de calidad",
            "Listo para entregar",
            "Entregado"
        ];

        // ============================================================
        //  MAPA DE ESTADOS A ETAPAS
        // ============================================================
        const estadoMap = {
            'En espera de abono': 0,
            'Pagado': 0,
            'En diseño': 1,
            'Diseño aprobado': 2,
            'En impresión': 3,
            'En planchado': 4,
            'En confección': 5,
            'Control de calidad': 6,
            'Listo para entregar': 7,
            'Enviado': 8,
            'Entregado': 8,
            'Cancelado': -1
        };

        // ============================================================
        //  OBTENER PEDIDOS DESDE GITHUB
        // ============================================================
        async function obtenerPedidosDesdeGitHub() {
            try {
                const response = await fetch(ORDERS_JSON_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error al descargar pedidos:', error);
                return null;
            }
        }

        // ============================================================
        //  BUSCAR PEDIDO
        // ============================================================
        async function buscarPedido() {
            const input = document.getElementById('searchInput');
            const codigo = input.value.trim().toUpperCase();
            if (!codigo) return;

            const container = document.getElementById('orderContent');
            container.innerHTML = `<div class="loading">⏳ Cargando pedido...</div>`;

            const pedidos = await obtenerPedidosDesdeGitHub();
            if (!pedidos) {
                container.innerHTML = `
                    <div class="order-card empty-state">
                        <div class="emoji">❌</div>
                        <h3>Error de conexión</h3>
                        <p>No se pudo cargar la lista de pedidos. Verifica tu conexión.</p>
                        <button class="search-btn" style="margin-top:16px;" onclick="buscarPedido()">Reintentar</button>
                    </div>
                `;
                return;
            }

            const pedido = pedidos.find(p => 
                (p.trackingCode || p.codigo || '').toUpperCase() === codigo
            );

            if (!pedido) {
                container.innerHTML = `
                    <div class="order-card empty-state">
                        <div class="emoji">❌</div>
                        <h3>Pedido no encontrado</h3>
                        <p>No encontramos ningún pedido con el código <strong>${codigo}</strong>.<br>Verifícalo e intenta de nuevo.</p>
                    </div>
                `;
                return;
            }

            // ✅ CALCULAR POSICIÓN EN COLA EN TIEMPO REAL
            const posicionCola = calcularPosicionCola(pedidos, pedido);
            const totalEnCola = pedidos.filter(p => 
                p.status !== 'Entregado' && p.status !== 'Cancelado'
            ).length;

            renderizarPedido(pedido, codigo, posicionCola, totalEnCola);
        }

        // ============================================================
        //  CALCULAR POSICIÓN EN COLA
        // ============================================================
        function calcularPosicionCola(pedidos, pedido) {
            const activos = pedidos
                .filter(p => p.status !== 'Entregado' && p.status !== 'Cancelado')
                .sort((a, b) => {
                    const fechaA = new Date(a.createdAt || a.fechaRegistro || 0);
                    const fechaB = new Date(b.createdAt || b.fechaRegistro || 0);
                    return fechaA - fechaB;
                });

            const posicion = activos.findIndex(p => 
                (p.trackingCode || p.codigo) === (pedido.trackingCode || pedido.codigo)
            );

            return posicion + 1;
        }

        // ============================================================
        //  RENDERIZAR PEDIDO
        // ============================================================
        function renderizarPedido(pedido, codigo, posicionCola, totalEnCola) {
            const container = document.getElementById('orderContent');

            const status = pedido.status || 'En espera de abono';
            const isCancelado = status === 'Cancelado';
            const isEntregado = status === 'Entregado';

            // Badge de estado
            let statusClass = 'status-pendiente';
            let statusText = status;
            if (isCancelado) {
                statusClass = 'status-cancelado';
                statusText = '❌ Cancelado';
            } else if (isEntregado) {
                statusClass = 'status-entregado';
                statusText = '✅ Entregado';
            } else if (status === 'Enviado') {
                statusClass = 'status-enviado';
                statusText = '🚚 Enviado';
            } else if (status === 'Pagado' || status === 'En espera de abono') {
                statusClass = 'status-pendiente';
                statusText = status === 'Pagado' ? 'Pagado' : '⏳ Pendiente';
            } else {
                statusClass = 'status-produccion';
                statusText = '⚙️ ' + status;
            }

            // Datos
            const cliente = pedido.customerName || pedido.cliente || 'Sin nombre';
            const producto = pedido.productType || pedido.producto || 'Sin producto';
            const talla = pedido.size || pedido.talla || '';
            const color = pedido.color || '';
            const diseno = pedido.design || pedido.detalles || '';
            const totalUSD = pedido.amountUsd || 0;
            const fechaRegistro = pedido.createdAt || pedido.fechaRegistro || new Date().toISOString();
            const tipoEntrega = pedido.tipoEntrega || 'Delivery';

            // Calcular etapa actual
            let etapaActual = estadoMap[status];
            if (isCancelado) etapaActual = -1;
            if (isEntregado) etapaActual = 8;

            // Progreso de cola
            const progresoCola = isCancelado ? 0 : ((totalEnCola - posicionCola + 1) / totalEnCola) * 100;

            // Tiempo estimado (días)
            const tiempoEstimado = posicionCola * 1.5;

            // ============================================================
            //  TIMELINE
            // ============================================================
            let timelineHtml = '';

            if (isCancelado) {
                timelineHtml = `<div style="text-align:center; padding:20px; color:#c62828;">❌ Pedido cancelado</div>`;
            } else {
                for (let i = 0; i < etapas.length; i++) {
                    let indicatorClass = '';
                    let statusTextTimeline = '';

                    if (isEntregado) {
                        indicatorClass = 'done';
                        statusTextTimeline = '✅ Completado';
                    } else if (i < etapaActual) {
                        indicatorClass = 'done';
                        statusTextTimeline = '✔️ Completado';
                    } else if (i === etapaActual) {
                        indicatorClass = 'active';
                        statusTextTimeline = '⏳ En proceso';
                    } else {
                        statusTextTimeline = '⏳ Pendiente';
                    }

                    const icon = (indicatorClass === 'done') ? '✓' : (indicatorClass === 'active' ? '●' : '○');

                    timelineHtml += `
                        <div class="step">
                            <div class="step-indicator ${indicatorClass}">${icon}</div>
                            <div class="step-info">
                                <div class="step-name">${etapas[i]}</div>
                                <div class="step-status-text ${indicatorClass}">${statusTextTimeline}</div>
                            </div>
                        </div>
                    `;
                }
            }

            // ============================================================
            //  RENDERIZAR HTML
            // ============================================================
            container.innerHTML = `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-code">📦 ${codigo}</span>
                        <span class="order-status ${statusClass}">${statusText}</span>
                    </div>

                    <div class="client-name">${cliente}</div>
                    <div class="product-detail"><span class="label">Producto:</span> ${producto} ${talla ? '· Talla ' + talla : ''}</div>
                    ${color ? `<div class="product-detail"><span class="label">Color:</span> ${color}</div>` : ''}
                    ${diseno ? `<div class="product-detail"><span class="label">Diseño:</span> ${diseno}</div>` : ''}

                    <div class="info-row">
                        <span class="info-label">Total</span>
                        <span class="info-value">\$${totalUSD} · ${new Date(fechaRegistro).toLocaleDateString('es-ES')}</span>
                    </div>

                    ${!isCancelado ? `
                    <div class="queue-section">
                        <div class="queue-number">#${posicionCola}</div>
                        <div class="queue-label">de ${totalEnCola} pedidos activos</div>
                        <div class="queue-subtext">
                            ${posicionCola === 1 ? '🎯 ¡Eres el próximo!' : `⏳ ${posicionCola - 1} pedido(s) antes de ti`}
                        </div>
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill" style="width: ${Math.min(100, progresoCola)}%;"></div>
                        </div>
                        <div class="queue-meta">
                            <span>⏱️ ${Math.ceil(tiempoEstimado)} días estimados</span>
                            <span>⚡ ${pedido.prioridad || 'Normal'}</span>
                            <span>🚚 ${tipoEntrega}</span>
                        </div>
                    </div>
                    ` : ''}

                    ${!isCancelado ? `
                    <div class="timeline">
                        <div class="timeline-title">📋 Progreso del pedido</div>
                        ${timelineHtml}
                    </div>
                    ` : ''}

                    ${isEntregado ? `
                    <div style="text-align:center; margin-top:16px; padding:12px; background:#e8f5e9; border-radius:16px; color:#2e7d32;">
                        ✅ ¡Pedido entregado con éxito! Gracias por confiar en nosotros. 🙌
                    </div>
                    ` : ''}

                    <a href="https://wa.me/584241234567?text=Hola%2C%20tengo%20una%20consulta%20sobre%20mi%20pedido%20${codigo}" target="_blank" class="whatsapp-btn">
                        💬 Contactar por WhatsApp
                    </a>
                </div>
            `;
        }

        // ============================================================
        //  DETECTAR CÓDIGO EN URL
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const codeFromUrl = urlParams.get('code');
        if (codeFromUrl) {
            document.getElementById('searchInput').value = codeFromUrl;
            buscarPedido();
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') buscarPedido();
        });
    </script>
</body>
</html>
